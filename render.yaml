# Render blueprint — deploys the tax-filing assistant as a Docker web service
# on the free tier. The conversational agent is LLM-driven and REQUIRES an
# OpenRouter key: set OPENROUTER_API_KEY in the Render dashboard
# (Environment → Add Environment Variable). The server won't start without it.
services:
  - type: web
    name: tiutni-tax-assistant
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Required — set the value in the Render dashboard (sync:false keeps the
      # secret out of this file). The agent's whole conversation runs on this.
      - key: OPENROUTER_API_KEY
        sync: false
      # Optional — pin a model id (defaults to deepseek/deepseek-v4-pro).
      # - key: TIUTNI_MODEL
      #   value: anthropic/claude-haiku-latest
