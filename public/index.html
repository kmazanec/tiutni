<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tax-Filing Assistant — 2025 Form 1040</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        font: 15px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        margin: 0; display: grid; grid-template-columns: 1fr 360px; height: 100vh;
      }
      @media (max-width: 800px) { body { grid-template-columns: 1fr; } #observe { display: none; } }
      header { grid-column: 1 / -1; padding: 12px 16px; border-bottom: 1px solid #8884; }
      h1 { font-size: 16px; margin: 0; }
      #chat { display: flex; flex-direction: column; min-height: 0; }
      #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
      .msg { max-width: 80%; padding: 8px 12px; border-radius: 10px; white-space: pre-wrap; }
      .user { align-self: flex-end; background: #2563eb; color: #fff; }
      .agent { align-self: flex-start; background: #8882; }
      #composer { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #8884; }
      #composer input { flex: 1; padding: 8px; font: inherit; }
      button { padding: 8px 14px; font: inherit; cursor: pointer; }
      #observe { border-left: 1px solid #8884; overflow-y: auto; padding: 12px; }
      #observe h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; opacity: .7; }
      .ev { font-size: 12px; padding: 6px 0; border-bottom: 1px dotted #8884; }
      .ev .t { opacity: .6; }
      #download { display: none; margin: 0 16px 12px; }
      a.dl { display: inline-block; padding: 8px 14px; background: #16a34a; color: #fff; text-decoration: none; border-radius: 8px; }
    </style>
  </head>
  <body>
    <header><h1>$ tax-filing assistant — 2025 Form 1040</h1></header>
    <section id="chat">
      <div id="log"></div>
      <div id="download"><a class="dl" id="dl" href="#">⬇ Download your completed 1040</a></div>
      <form id="composer">
        <input id="input" autocomplete="off" placeholder="Say hi to get started…" />
        <button type="submit">Send</button>
      </form>
    </section>
    <aside id="observe">
      <h2>Observation trail</h2>
      <div id="events"></div>
    </aside>
    <script src="/app.js" type="module"></script>
  </body>
</html>
